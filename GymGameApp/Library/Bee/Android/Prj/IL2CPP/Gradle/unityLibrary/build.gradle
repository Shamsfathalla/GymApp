apply plugin: 'com.android.library'
apply from: '../shared/keepUnitySymbols.gradle'
apply from: '../shared/common.gradle'


dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
// Android Resolver Dependencies Start
    implementation 'com.google.android.gms:play-services-base:18.10.0' // Assets/firebase/Editor/DatabaseDependencies.xml:20
    implementation 'com.google.firebase:firebase-analytics:23.0.0' // Assets/firebase/Editor/StorageDependencies.xml:18
    implementation 'com.google.firebase:firebase-analytics-unity:13.9.0' // Assets/firebase/Editor/AnalyticsDependencies.xml:21
    implementation 'com.google.firebase:firebase-app-unity:13.9.0' // Assets/firebase/Editor/AppDependencies.xml:25
    implementation 'com.google.firebase:firebase-auth:24.0.1' // Assets/firebase/Editor/AuthDependencies.xml:16
    implementation 'com.google.firebase:firebase-auth-unity:13.9.0' // Assets/firebase/Editor/AuthDependencies.xml:23
    implementation 'com.google.firebase:firebase-common:22.0.1' // Assets/firebase/Editor/AppDependencies.xml:16
    implementation 'com.google.firebase:firebase-config:23.0.1' // Assets/firebase/Editor/RemoteConfigDependencies.xml:16
    implementation 'com.google.firebase:firebase-config-unity:13.9.0' // Assets/firebase/Editor/RemoteConfigDependencies.xml:23
    implementation 'com.google.firebase:firebase-crashlytics-ndk:20.0.4' // Assets/firebase/Editor/CrashlyticsDependencies.xml:16
    implementation 'com.google.firebase:firebase-crashlytics-unity:13.9.0' // Assets/firebase/Editor/CrashlyticsDependencies.xml:23
    implementation 'com.google.firebase:firebase-database:22.0.1' // Assets/firebase/Editor/DatabaseDependencies.xml:16
    implementation 'com.google.firebase:firebase-database-unity:13.9.0' // Assets/firebase/Editor/DatabaseDependencies.xml:25
    implementation 'com.google.firebase:firebase-firestore:26.1.1' // Assets/firebase/Editor/FirestoreDependencies.xml:16
    implementation 'com.google.firebase:firebase-firestore-unity:13.9.0' // Assets/firebase/Editor/FirestoreDependencies.xml:23
    implementation 'com.google.firebase:firebase-iid:21.1.0' // Assets/firebase/Editor/MessagingDependencies.xml:20
    implementation 'com.google.firebase:firebase-messaging:25.0.1' // Assets/firebase/Editor/MessagingDependencies.xml:16
    implementation 'com.google.firebase:firebase-messaging-unity:13.9.0' // Assets/firebase/Editor/MessagingDependencies.xml:27
    implementation 'com.google.firebase:firebase-storage:22.0.1' // Assets/firebase/Editor/StorageDependencies.xml:16
    implementation 'com.google.firebase:firebase-storage-unity:13.9.0' // Assets/firebase/Editor/StorageDependencies.xml:23
    implementation 'com.google.flatbuffers:flatbuffers-java:1.12.0' // Assets/firebase/Editor/MessagingDependencies.xml:22
// Android Resolver Dependencies End
    implementation(name: 'firebase-messaging-cpp', ext:'aar')
    implementation project(':unityLibrary:FirebaseApp.androidlib')
    implementation project(':unityLibrary:FirebaseCrashlytics.androidlib')
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.games:games-activity:3.0.5'
    implementation 'androidx.games:games-frame-pacing:2.1.2'

}

// Android Resolver Exclusions Start
android {
  packaging {
      exclude ('/lib/armeabi/*' + '*')
      exclude ('/lib/armeabi-v7a/*' + '*')
      exclude ('/lib/mips/*' + '*')
      exclude ('/lib/mips64/*' + '*')
      exclude ('/lib/x86/*' + '*')
      exclude ('/lib/x86_64/*' + '*')
  }
}
// Android Resolver Exclusions End
android {
    namespace "com.unity3d.player"
    ndkPath "C:/Program Files/Unity/Hub/Editor/6000.3.6f1-x86_64/Editor/Data/PlaybackEngines/AndroidPlayer/NDK"
    ndkVersion "27.2.12479018"

    compileSdk 36
    buildToolsVersion = "36.0.0"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        minSdk 25
        targetSdk 36
        ndk {
            abiFilters 'arm64-v8a'
            debugSymbolLevel 'none'
        }
        versionCode 1
        versionName '1.0'
        consumerProguardFiles 'proguard-unity.txt'
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }

    }

    lint {
        abortOnError false
    }

    androidResources {
        noCompress = ['.unity3d', '.ress', '.resource', '.obb', '.bundle', '.unityexp'] + unityStreamingAssets.tokenize(', ')
        ignoreAssetsPattern = "!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~"
    }

    packaging {
        jniLibs {
                useLegacyPackaging true
        }
    }
}


android.externalNativeBuild {
    cmake {
        version "3.22.1"
        // Workaround for CMake long path issue on Windows, place CMake intermediate files next to Unity project
        buildStagingDirectory "${unityProjectPath}/.utmp"
        path "src/main/cpp/CMakeLists.txt"
    }
}
android.buildFeatures {
    prefab true
}

